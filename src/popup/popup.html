<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Entry Sync</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #1a1a2e;
    }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-dot.connecting { background: #f59e0b; }
    .status-text { font-size: 13px; color: #444; }
    .var-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 8px;
    }
    .var-item {
      padding: 4px 0;
      font-size: 12px;
      font-family: monospace;
      border-bottom: 1px solid #f5f5f5;
    }
    .var-item:last-child { border-bottom: none; }
    .var-name { color: #4f80ff; }
    .var-value { color: #22c55e; }
  </style>
</head>
<body>
  <h1>Entry Sync</h1>

  <div class="status">
    <span class="status-dot disconnected" id="statusDot"></span>
    <span class="status-text" id="statusText">Disconnected</span>
  </div>

  <div class="section">
    <div class="section-title">동기화 중인 변수</div>
    <div class="var-list" id="varList">
      <div style="color:#999; font-size:12px;">Entry 작품을 실행하면 변수가 여기에 표시됩니다.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
